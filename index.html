<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SELF</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* WHITE TITLE */
h1 {
    color: white;
    position: absolute;
    top: 10px;
    left: 10px;
    margin: 0;
    font-family: Arial, sans-serif;
    z-index: 10;
    font-size: 20px;
}

canvas {
    display: block;
}
</style>
</head>

<body>

<h1>AI MADE THIS</h1>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

// particles exist only as long as they are "seen"
let particles = [];

function spawn(){
    return {
        x: Math.random() * c.width,
        y: Math.random() * c.height,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 1
    };
}

// initial reality
for(let i = 0; i < 300; i++){
    particles.push(spawn());
}

function loop(){
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,c.width,c.height);

    let mouseInfluence = window._mouse || {x:c.width/2, y:c.height/2};

    for(let i = 0; i < particles.length; i++){
        let p = particles[i];

        let dx = mouseInfluence.x - p.x;
        let dy = mouseInfluence.y - p.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        // attention gravity
        if(dist < 200){
            p.vx += dx * 0.0005;
            p.vy += dy * 0.0005;
        }

        p.x += p.vx;
        p.y += p.vy;

        // bounce
        if(p.x < 0 || p.x > c.width) p.vx *= -1;
        if(p.y < 0 || p.y > c.height) p.vy *= -1;

        // life decay
        p.life -= 0.002;

        // draw
        let alpha = Math.max(0, p.life);
        ctx.fillStyle = `rgba(0,255,180,${alpha})`;
        ctx.fillRect(p.x, p.y, 2, 2);

        // split when “noticed”
        if(dist < 100 && Math.random() < 0.01){
            particles.push(spawn());
        }
    }

    // remove dead particles
    particles = particles.filter(p => p.life > 0);

    // keep world alive
    if(particles.length < 200){
        particles.push(spawn());
    }

    requestAnimationFrame(loop);
}

// mouse tracking
window._mouse = {x: window.innerWidth/2, y: window.innerHeight/2};

window.addEventListener("mousemove", e => {
    window._mouse.x = e.clientX;
    window._mouse.y = e.clientY;
});

loop();
</script>

</body>
</html>
